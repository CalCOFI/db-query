name: Bump default_version from GCS latest.txt

on:
  # dispatched by CalCOFI/workflows test_release.qmd immediately after it
  # promotes a release to latest.txt (i.e. only once every pre-baked query has
  # passed against that release). No cron poll — the bump is event-driven so the
  # site adopts the new default_version within minutes, never pointing at a
  # release whose queries haven't been validated.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read GCS latest.txt and current _config.yml default
        id: check
        run: |
          set -euo pipefail
          latest="$(curl -fsSL https://storage.googleapis.com/calcofi-db/ducklake/releases/latest.txt | tr -d '[:space:]')"
          if [[ ! "$latest" =~ ^v[0-9]{4}\.[0-9]{2}\.?[0-9]*$ ]]; then
            echo "latest.txt content unexpected: '$latest'" >&2
            exit 1
          fi
          current="$(awk -F': *' '/^default_version:/ {print $2; exit}' _config.yml | tr -d '[:space:]')"
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [[ "$latest" == "$current" ]]; then
            echo "no-op: default_version already $current"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "will bump $current → $latest"
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Bump _config.yml and commit
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          latest="${{ steps.check.outputs.latest }}"
          # match the existing line shape (with or without trailing comments)
          sed -i -E "s/^(default_version:[[:space:]]*).*$/\1$latest/" _config.yml
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _config.yml
          git commit -m "Bump default_version to $latest" \
                     -m "Promoted by GCS latest.txt (set after a successful test_release.qmd run in CalCOFI/workflows)."
          git push origin main
